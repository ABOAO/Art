<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Koi Pond</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #08161d;
      }

      body {
        position: relative;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: pointer;
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <canvas id="pond" aria-label="Interactive koi pond"></canvas>
    <script src="sketch.js"></script>
  </body>
</html>
